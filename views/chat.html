<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMinsta Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/home" class="brand">GMinsta</a>
      <nav class="nav nav-pills">
        <a href="/home">Home</a>
        <a href="/discover">Discover</a>
        <a href="/profile">Profile</a>
        <a href="/chat" class="active">Messages</a>
      </nav>
      <div class="row topbar-actions">
        <button id="themeBtn" class="btn-outline">Dark/Light</button>
        <button id="logoutBtn" class="btn-danger">Logout</button>
      </div>
    </div>
  </header>

  <main class="container chat-layout">
    <div class="card chat-sidebar">
      <div class="sidebar-section">
        <h3>Conversations</h3>
        <div id="conversationsList"></div>
      </div>
      <div class="sidebar-section">
        <h3>Friends</h3>
        <div id="friendsList"></div>
      </div>
    </div>

    <div class="card chat-main">
      <h3 id="chatTitle">Select a friend to start chatting</h3>
      <div id="chatBox" class="chat-box"></div>
      <form id="chatForm" class="chat-form">
        <input id="messageText" placeholder="Type a message..." />
        <button type="submit">Send</button>
      </form>
    </div>
  </main>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/public/js/api.js"></script>
  <script src="/public/js/theme.js"></script>
  <script src="/public/js/chat.js"></script>
</body>
</html>
