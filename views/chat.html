<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMinsta Chat</title>
  <link rel="stylesheet" href="/public/css/style.css" />
</head>
<body>
  <div class="container">
    <div class="row between nav">
      <div>
        <a href="/home">Home</a>
        <a href="/profile">Profile</a>
        <a href="/chat">Chat</a>
      </div>
      <div class="row">
        <button id="themeBtn">Dark/Light</button>
        <button id="logoutBtn" class="btn-danger">Logout</button>
      </div>
    </div>
    <div class="card">
      <h3>One-to-one Chat</h3>
      <input id="otherUserId" placeholder="Enter receiver user ID" />
      <button id="loadChatBtn">Load Conversation</button>
      <div id="chatBox" class="chat-box"></div>
      <form id="chatForm">
        <input id="messageText" placeholder="Type a message..." />
        <button type="submit">Send</button>
      </form>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/public/js/api.js"></script>
  <script src="/public/js/theme.js"></script>
  <script src="/public/js/chat.js"></script>
</body>
</html>
