<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMinsta Discover</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/home" class="brand">GMinsta</a>
      <nav class="nav nav-pills">
        <a href="/home">Home</a>
        <a href="/discover" class="active">Discover</a>
        <a href="/profile">Profile</a>
        <a href="/chat">Messages</a>
      </nav>
      <div class="row topbar-actions">
        <button id="themeBtn" class="btn-outline">Dark/Light</button>
        <button id="logoutBtn" class="btn-danger">Logout</button>
      </div>
    </div>
  </header>

  <main class="container app-shell">
    <section class="feed-column">
      <div class="card composer">
        <h3>Discover Users</h3>
        <p>Browse registered users, follow them instantly, and message friends in real time.</p>
      </div>
      <div id="discoverList" class="users-list"></div>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/public/js/api.js"></script>
  <script src="/public/js/theme.js"></script>
  <script src="/public/js/discover.js"></script>
</body>
</html>
