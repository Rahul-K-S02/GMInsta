<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMinsta Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/home" class="brand">GMinsta</a>
      <nav class="nav nav-pills">
        <a href="/home" class="active">Home</a>
        <a href="/discover">Discover</a>
        <a href="/profile">Profile</a>
        <a href="/chat">Messages</a>
      </nav>
      <div class="row topbar-actions">
        <button id="themeBtn" class="btn-outline">Dark/Light</button>
        <button id="logoutBtn" class="btn-danger">Logout</button>
      </div>
    </div>
  </header>

  <main class="container app-shell">
    <aside class="left-rail card">
      <div class="sidebar-section">
        <h4>Quick Menu</h4>
        <a href="/home" class="rail-link active">Home Feed</a>
        <a href="/discover" class="rail-link">Discover</a>
        <a href="/profile" class="rail-link">My Profile</a>
        <a href="/chat" class="rail-link">Direct Messages</a>
      </div>
      
      <div class="sidebar-section">
        <h4>👥 My Friends</h4>
        <div id="friendsList" class="users-list"></div>
      </div>
      
      <div class="sidebar-section">
        <h4>✨ Suggested Users</h4>
        <div id="exploreUsers" class="users-list"></div>
      </div>
    </aside>

    <section class="feed-column">
      <div class="stories card">
        <div class="story active">You</div>
        <div class="story">Creators</div>
        <div class="story">Friends</div>
        <div class="story">Explore</div>
      </div>

      <div class="card composer">
        <h3>Create Post</h3>
        <form id="postForm">
          <input name="caption" placeholder="Write a caption..." required />
          <input id="postImage" name="image" type="file" accept="image/*" required />
          <img id="imagePreview" class="preview" style="display:none;" alt="preview" />
          <button type="submit">Share</button>
        </form>
      </div>

      <div id="feed"></div>
    </section>

    <aside class="right-rail card">
      <h3>Notifications</h3>
      <div id="notifications" class="muted"></div>
    </aside>
  </main>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/public/js/api.js"></script>
  <script src="/public/js/theme.js"></script>
  <script src="/public/js/home.js"></script>
</body>
</html>
