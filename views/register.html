<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMinsta Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/style.css" />
</head>
<body>
  <main class="auth-layout">
    <section class="auth-visual">
      <div class="phone-frame">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <div class="story-row">
            <span class="story-dot"></span>
            <span class="story-dot"></span>
            <span class="story-dot"></span>
          </div>
          <div class="fake-post"></div>
          <div class="fake-post small"></div>
        </div>
      </div>
    </section>
    <section class="auth-form-wrap">
      <div class="card auth-card">
        <h1 class="brand auth-brand">GMinsta</h1>
        <form id="registerForm">
          <input id="username" type="text" placeholder="Username" required />
          <input id="email" type="email" placeholder="Email" required />
          <input id="password" type="password" placeholder="Password" required />
          <button type="submit">Sign up</button>
        </form>
        <p id="message"></p>
      </div>
      <div class="card auth-switch">
        <p>Already have account? <a href="/">Login</a></p>
      </div>
    </section>
  </main>
  <script src="/public/js/api.js"></script>
  <script src="/public/js/auth.js"></script>
</body>
</html>
